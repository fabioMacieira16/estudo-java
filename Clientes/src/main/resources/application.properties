spring.datasource.url=jdbc:h2:men:db
spring.datasource.driveClassName = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password = password

spring.jpa.database-plataform=org.hibernate.dialect.H2Dialect

spring.h2.console.enable=true
spring.h2.console.path=/h2-console

spring.h2.properties.hibernate.show_sql=true
spring.h2.properties.hibernate.format_sql=true
